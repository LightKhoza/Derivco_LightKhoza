<div class="auth-page">

  <div class="bg-mesh"></div>
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>
  <div class="bg-glow three"></div>

  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-5">

        <div class="auth-card forgot-card">

          <h2 class="text-center">Forgot Password</h2>

          <p class="forgot-subtitle">
            Follow the steps below to securely reset your password.
          </p>

          <div class="step-indicator">
            <span [class.active]="step === 1">1</span>
            <span class="line"></span>
            <span [class.active]="step === 2">2</span>
          </div>

          <div *ngIf="step === 1" class="step">

            <input [(ngModel)]="email"
                   #emailRef="ngModel"
                   name="email"
                   required
                   email
                   placeholder="Enter email"
                   class="form-control mb-1">

            <div class="error" *ngIf="emailRef.invalid && emailRef.touched">
              <small *ngIf="emailRef.errors?.['required']">Email is required</small>
              <small *ngIf="emailRef.errors?.['email']">Enter valid email</small>
            </div>

            <button class="btn btn-primary w-100 mt-2"
                    [disabled]="emailRef.invalid || loading"
                    (click)="sendToken()">

              <span *ngIf="!loading">Send Reset Token</span>
              <span *ngIf="loading">Sending...</span>

            </button>

          </div>

          <div *ngIf="step === 2" class="step">

            <input [(ngModel)]="token"
                   #tokenRef="ngModel"
                   name="token"
                   required
                   placeholder="Enter token"
                   class="form-control mb-1">

            <div class="error" *ngIf="tokenRef.invalid && tokenRef.touched">
              <small>Token is required</small>
            </div>

            <input [(ngModel)]="newPassword"
                   #passwordRef="ngModel"
                   name="password"
                   required
                   minlength="6"
                   type="password"
                   placeholder="New password"
                   class="form-control mb-1">

            <div class="error" *ngIf="passwordRef.invalid && passwordRef.touched">
              <small *ngIf="passwordRef.errors?.['required']">Password required</small>
              <small *ngIf="passwordRef.errors?.['minlength']">Min 6 characters</small>
            </div>

            <button class="btn btn-success w-100 mt-2"
                    [disabled]="tokenRef.invalid || passwordRef.invalid || loading"
                    (click)="reset()">

              <span *ngIf="!loading">Reset Password</span>
              <span *ngIf="loading">Resetting...</span>

            </button>

          </div>

          <p class="error text-center mt-2" *ngIf="errorMessage">
            {{ errorMessage }}
          </p>

          <p class="success text-center mt-2" *ngIf="successMessage">
            {{ successMessage }}
          </p>

        </div>

      </div>
    </div>
  </div>

</div>
